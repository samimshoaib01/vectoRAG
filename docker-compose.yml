services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vectordb
      POSTGRES_USER: vdb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vdb -d vectordb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  vectordb:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://vdb:${POSTGRES_PASSWORD}@postgres:5432/vectordb
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  # caddy: uncommment and remove vectordb ports above once you have a domain

volumes:
  pgdata:
  ollama_models:
